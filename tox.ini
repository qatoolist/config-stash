[tox]
envlist = py38,py39,py310,py311,py312,lint,type,security
skipsdist = False
isolated_build = True

[testenv]
deps =
    -r requirements-test.txt
commands =
    pytest tests/ -v --cov=config_stash --cov-report=term-missing

[testenv:lint]
deps =
    black
    isort
    ruff
commands =
    black --check src/ tests/
    isort --check-only src/ tests/
    ruff check src/ tests/

[testenv:format]
deps =
    black
    isort
commands =
    black src/ tests/
    isort src/ tests/

[testenv:type]
deps =
    mypy
    types-toml
    types-PyYAML
    types-click
    types-requests
commands =
    mypy src/config_stash tests/

[testenv:security]
deps =
    bandit[toml]
    safety
commands =
    bandit -r src/config_stash -f json
    safety check --json

[testenv:docs]
changedir = docs
deps =
    sphinx
    sphinx-rtd-theme
    sphinx-autodoc-typehints
    myst-parser
commands =
    sphinx-build -W -b html -d {envtmpdir}/doctrees . {envtmpdir}/html

[testenv:build]
deps =
    build
    twine
commands =
    python -m build
    twine check dist/*

[testenv:dev]
deps =
    -r requirements-dev.txt
commands =
    {posargs:pytest}

# Configuration for other tools
[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    integration: marks tests as integration tests
    slow: marks tests as slow
    unit: marks tests as unit tests

[coverage:run]
source = src/config_stash
branch = True
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
precision = 2
show_missing = True